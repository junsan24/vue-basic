<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Basic</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        {{ name }}
    </div>

    <div id="app2">
        {{ title }}
    </div>

    <script>
        const App = {
            data() {
                return {
                    name: 'Jun'
                }
            }
        }

        Vue.createApp(App).mount('#app')

        Vue.createApp({
            data() {
                return {
                    title: 'Vue Basic'
                }
            }
        }).mount('#app2')

    </script>
</body>
</html>
